[misc]
# Run `sudo -v` to cache credentials at the start of the run
# This avoids a blocking password prompt in the middle of an unattended run
# (default: false)
pre_sudo = true

# Periodically runs `sudo -v` or `please -w` to avoid password re-prompts during
# updates (default: false).
# WARNING: This is a potential security risk; if you walk away from the computer
# while `topgrade` is running, another person can come by, `CTRL+C`, and gain
# access to a `sudo` session.
sudo_loop = true

# Disable specific steps - same options as the command line flag
# `emacs` - Doom Emacs fails to update, likely due to it being symlinked to a
# submodule.
# `bun` - Fails with 403 status code. Installed through brew instead.
# `shell` - `oh-my-zsh` tries pulling submodules which fails.
# `gnome_shell_extensions` -
#		`Error: GDBus.Error:org.freedesktop.DBus.Error.NoReply: Remote peer disconnected`?
# `helix` - Avoid bloating disk space with grammars.
disable = ["emacs", "gnome_shell_extensions", "helix"]

# Run these steps before all others
first = ["git", "system"]

# Run these steps after all others
last = ["winget"]

remote_topgrade_path = ".local/share/cargo/bin/topgrade"

# Don't ask for confirmations (no default value)
assume_yes = true

# Clean up temporary or old files (default: false)
cleanup = true

[python]
enable_pip_review = true
enable_pip_review_local = true
enable_pipupgrade = true
pipupgrade_arguments = "-y -u --pip-path pip"

[git]

# Additional git repositories to pull
repos = ["~"]

[windows]
# Manually select Windows updates
accept_all_updates = true

wsl_update_pre_release = true

wsl_update_use_web_download = true

# Causes Topgrade to rename itself during the run to allow package managers
# to upgrade it. Use this only if you installed Topgrade by using a package
# manager such as Scoop or Cargo
self_rename = true

[firmware]
# Offer to update firmware; if false just check for and display available updates
upgrade = true
