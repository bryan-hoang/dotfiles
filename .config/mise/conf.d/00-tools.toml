[tool_alias]
cargo-cache = "cargo:cargo-cache"
cocogitto = "cargo:cocogitto"
dab = "dotnet:microsoft.dataapibuilder"
delta = "cargo:git-delta"
diff-pdf = "github:vslavik/diff-pdf"
dtctl = "github:dynatrace-oss/dtctl"
ec = "aqua:editorconfig-checker/editorconfig-checker"
fff-mcp = "github:dmtrKovalenko/fff"
gfr = "pipx:git-filter-repo"
git-absorb = "cargo:git-absorb"
git-grab = "cargo:git-grab"
lychee = "cargo:lychee"
monaco = "github:dynatrace/dynatrace-configuration-as-code"
pac = "dotnet:Microsoft.PowerApps.CLI.Tool"
rage = "github:str4d/rage"
rtk = "github:rtk-ai/rtk"
sccache = "cargo:sccache"
skills = "npm:skills"
television = "cargo:television"
tspin = "cargo:tailspin"
vscode-lsp = "npm:vscode-langservers-extracted"
# `pipx` backend doesn't work on windows
azure-cli = "github:azure/azure-cli"
# Built-in alias doesn't work on windows
gs = "go:github.com/sigstore/gitsign"
# Aqua backend doesn't support windows
hunkdiff = "npm:hunkdiff"
# Aqua backend doesn't support renaming the binary to `.exe` on windows
sonarqube-cli = "http:sonarqube-cli"

[tools]
atuin = "latest"
aube = { version = "latest", minimum_release_age = "0d" }
betterleaks = "latest"
bun = "latest"
cargo-binstall = "latest"
cargo-cache = "latest"
cocogitto = "latest"
delta = "latest"
ec = "latest"
gfr = "latest"
gh = "latest"
git-absorb = "latest"
git-grab = "latest"
go = "latest"
gs = "latest"
harper-cli = "latest"
harper-ls = "latest"
hk = { version = "latest", minimum_release_age = "1d" }
jaq = "latest"
lychee = "latest"
node = "latest"
"npm:sfw" = "latest"
opencode = { version = "latest", minimum_release_age = "0d" }
oxfmt = "latest"
oxlint = "latest"
pkl = "latest"
pnpm = { version = "latest", minimum_release_age = "0d" }
rmz = "latest"
rtk = "latest"
rumdl = "latest"
sccache = "latest"
shellcheck = "latest"
shfmt = "latest"
skills = "latest"
starship = "latest"
taplo = "latest"
television = "latest"
tree-sitter = "latest"
tspin = "latest"
typos = "latest"
usage = { version = "latest", minimum_release_age = "0d" }
uv = "latest"
zoxide = "latest"
# diff-pdf = "latest"

[tools.vscode-lsp]
aube_args = "--allow-build=core-js"
version = "latest"

[tools.fff-mcp]
minimum_release_age = "1d"
version = "latest"

[tools.fff-mcp.platforms]
windows-x64 = { asset_pattern = 'fff-mcp-{{arch(x64="x86_64")}}-pc-{{os()}}-msvc.exe', bin = "fff-mcp.exe" }

[tools.hunkdiff]
aube_args = "--allow-build=bun"
version = "latest"
