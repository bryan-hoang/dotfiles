[tool_alias]
aube = "github:jdx/aube"
dab = "dotnet:microsoft.dataapibuilder"
fff-mcp = "github:dmtrKovalenko/fff"
hunkdiff = "npm:hunkdiff"
monaco = "github:dynatrace/dynatrace-configuration-as-code"
op = "http:op"
pac = "dotnet:Microsoft.PowerApps.CLI.Tool"
rage = "github:str4d/rage"
sonarqube-cli = "http:sonarqube-cli"

[tools]
actionlint = "latest"
atuin = "latest"
aube = { version = "latest", minimum_release_age = "1d" }
betterleaks = "latest"
bitwarden = "latest"
bun = "latest"
cargo-binstall = "latest"
"cargo:cargo-cache" = "latest"
"cargo:git-absorb" = "latest"
"cargo:git-grab" = "latest"
"cargo:ryl" = { version = "latest", minimum_release_age = "1d" }
"cargo:tailspin" = "latest"
"cargo:tealdeer" = "latest"
cocogitto = "latest"
delta = "latest"
editorconfig-checker = "latest"
gh = "latest"
git-filter-repo = "latest"
"github:rtk-ai/rtk" = "latest"
"github:vslavik/diff-pdf" = "latest"
go = "latest"
"go:github.com/dnnrly/abbreviate" = "latest"
"go:github.com/sigstore/gitsign" = "latest"
harper-cli = "latest"
harper-ls = "latest"
hk = { version = "latest", minimum_release_age = "1d" }
jaq = "latest"
jq = "latest"
lychee = "latest"
node = "latest"
"npm:chrome-devtools-mcp" = "latest"
"npm:sfw" = "latest"
"npm:skills" = "latest"
opencode = { version = "latest", minimum_release_age = "1d" }
oxfmt = "latest"
oxlint = "latest"
pkl = "latest"
pnpm = { version = "latest", minimum_release_age = "1d" }
rage = "latest"
rmz = "latest"
rumdl = "latest"
rust = "nightly"
sccache = "latest"
shellcheck = "latest"
shfmt = "latest"
starship = "latest"
taplo = "latest"
television = "latest"
topgrade = "latest"
tree-sitter = "latest"
typos = "latest"
usage = "latest"
uv = "latest"
zizmor = "latest"
zoxide = "latest"

[tools.fff-mcp]
minimum_release_age = "1d"
version = "latest"

[tools.fff-mcp.platforms]
windows-x64 = { asset_pattern = 'fff-mcp-{{arch(x64="x86_64")}}-pc-{{os()}}-msvc.exe', bin = "fff-mcp.exe" }

[tools.hunkdiff]
aube_args = "--allow-build=bun"
version = "latest"
